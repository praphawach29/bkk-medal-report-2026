        ];

        let searchTerm = '';
        let selectedSport = 'All';
        let selectedMedal = 'All';

        const searchInput = document.getElementById('search-input');
        const sportSelect = document.getElementById('sport-select');
        const medalSelect = document.getElementById('medal-select');
        const mobileView = document.getElementById('mobile-view');
        const desktopTbody = document.getElementById('desktop-tbody');
        const statGold = document.getElementById('stat-gold');
        const statSilver = document.getElementById('stat-silver');
        const statBronze = document.getElementById('stat-bronze');
        const statTotal = document.getElementById('stat-total');

        function init() {
            populateSportFilter();
            searchInput.addEventListener('input', (e) => { searchTerm = e.target.value.toLowerCase(); renderAll(); });
            sportSelect.addEventListener('change', (e) => { selectedSport = e.target.value; renderAll(); });
            medalSelect.addEventListener('change', (e) => { selectedMedal = e.target.value; renderAll(); });
            renderAll();
        }

        function populateSportFilter() {
            const sports = [...new Set(medalData.map(item => item.sport))].sort();
            sports.forEach(sport => {
                const option = document.createElement('option');
                option.value = sport;
                option.textContent = sport;
                sportSelect.appendChild(option);
            });
        }

        function getMedalColorClass(type) {
            if (type === 'Gold') return 'text-amber-500 bg-amber-50 border-amber-200';
            if (type === 'Silver') return 'text-slate-400 bg-slate-50 border-slate-200';
            if (type === 'Bronze') return 'text-orange-700 bg-orange-50 border-orange-200';
            return 'text-gray-500 bg-gray-50';
        }

        function getMedalText(type) {
            if (type === 'Gold') return 'เหรียญทอง';
            if (type === 'Silver') return 'เหรียญเงิน';
            if (type === 'Bronze') return 'เหรียญทองแดง';
            return '';
        }

        function renderAll() {
            const filteredData = medalData.filter(item => {
                const s = searchTerm.trim();
                const matchSearch = item.sport.toLowerCase().includes(s) || item.event.toLowerCase().includes(s) || item.athletes.some(a => a.toLowerCase().includes(s));
                const matchSport = selectedSport === 'All' || item.sport === selectedSport;
                const matchMedal = selectedMedal === 'All' || item.type === selectedMedal;
                return matchSearch && matchSport && matchMedal;
            });

            const counts = { Gold: 0, Silver: 0, Bronze: 0 };
            filteredData.forEach(item => { if (counts[item.type] !== undefined) counts[item.type]++; });
            
            statGold.textContent = counts.Gold;
            statSilver.textContent = counts.Silver;
            statBronze.textContent = counts.Bronze;
            statTotal.textContent = filteredData.length;

            renderMobileView(filteredData);
            renderDesktopView(filteredData);
            lucide.createIcons();
        }

        function renderMobileView(data) {
            if (data.length === 0) {
                mobileView.innerHTML = `<div class="p-10 text-center text-slate-400"><i data-lucide="search" class="w-10 h-10 mb-3 mx-auto opacity-20"></i><p>ไม่พบข้อมูล</p></div>`;
                return;
            }
            mobileView.innerHTML = data.map((item, index) => `
                <div class="bg-white p-4 rounded-2xl shadow-sm border border-slate-100">
                    <div class="flex justify-between items-start mb-2">
                        <div class="flex items-center gap-1.5 px-2.5 py-1 rounded-full border text-[10px] font-bold ${getMedalColorClass(item.type)}">
                            <i data-lucide="medal" class="w-3.5 h-3.5"></i> ${getMedalText(item.type)}
                        </div>
                        <span class="text-slate-400 text-[10px]">ลำดับ ${index + 1}</span>
                    </div>
                    <h3 class="font-bold text-slate-800 text-base mb-1">${item.sport}</h3>
                    <div class="text-slate-600 text-xs mb-3 flex items-start gap-1.5"><i data-lucide="info" class="w-3.5 h-3.5 shrink-0 mt-0.5"></i>${item.event}</div>
                    <div class="pt-3 border-t border-slate-50 flex flex-wrap gap-1.5">${item.athletes.map(a => `<div class="bg-slate-50 border border-slate-100 px-2 py-0.5 rounded-lg text-[11px] flex items-center gap-1"><i data-lucide="users" class="w-3 h-3 text-emerald-500"></i>${a}</div>`).join('')}</div>
                </div>
            `).join('');
        }

        function renderDesktopView(data) {
            if (data.length === 0) {
                desktopTbody.innerHTML = `<tr><td colspan="5" class="p-20 text-center text-slate-400">ไม่พบข้อมูล</td></tr>`;
                return;
            }
            desktopTbody.innerHTML = data.map((item, index) => `
                <tr class="hover:bg-slate-50/50 transition-colors">
                    <td class="p-5 text-slate-400 text-center">${index + 1}</td>
                    <td class="p-5">
                        <div class="flex items-center gap-2 px-3 py-1.5 rounded-full border text-xs font-bold w-fit ${getMedalColorClass(item.type)}">
                            <i data-lucide="medal" class="w-4 h-4"></i> ${getMedalText(item.type)}
                        </div>
                    </td>
                    <td class="p-5 font-semibold text-slate-700">${item.sport}</td>
                    <td class="p-5 text-slate-600 text-sm">${item.event}</td>
                    <td class="p-5">
                        <div class="flex flex-wrap gap-1.5">${item.athletes.map(a => `<div class="bg-white border border-slate-200 px-3 py-1 rounded-lg text-sm flex items-center gap-1.5 shadow-sm"><i data-lucide="users" class="w-3.5 h-3.5 text-emerald-500"></i>${a}</div>`).join('')}</div>
                    </td>
                </tr>
            `).join('');
        }

        document.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>
