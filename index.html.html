        // State Variables
        let searchTerm = '';
        let selectedSport = 'All';

        // DOM Elements
        const searchInput = document.getElementById('search-input');
        const sportSelect = document.getElementById('sport-select');
        const mobileView = document.getElementById('mobile-view');
        const desktopTbody = document.getElementById('desktop-tbody');
        const statGold = document.getElementById('stat-gold');
        const statSilver = document.getElementById('stat-silver');
        const statBronze = document.getElementById('stat-bronze');
        const statTotal = document.getElementById('stat-total');

        // Initial Setup
        function init() {
            populateSportFilter();
            
            // Event Listeners
            searchInput.addEventListener('input', (e) => {
                searchTerm = e.target.value.toLowerCase();
                renderAll();
            });

            sportSelect.addEventListener('change', (e) => {
                selectedSport = e.target.value;
                renderAll();
            });

            renderAll();
        }

        function populateSportFilter() {
            const sports = [...new Set(medalData.map(item => item.sport))].sort();
            sports.forEach(sport => {
                const option = document.createElement('option');
                option.value = sport;
                option.textContent = sport;
                sportSelect.appendChild(option);
            });
        }

        // Get styled colors depending on medal
        function getMedalColorClass(type) {
            switch(type) {
                case 'Gold': return 'text-amber-500 bg-amber-50 border-amber-200';
                case 'Silver': return 'text-slate-400 bg-slate-50 border-slate-200';
                case 'Bronze': return 'text-orange-700 bg-orange-50 border-orange-200';
                default: return 'text-gray-500 bg-gray-50';
            }
        }

        function getMedalText(type) {
            switch(type) {
                case 'Gold': return 'เหรียญทอง';
                case 'Silver': return 'เหรียญเงิน';
                case 'Bronze': return 'เหรียญทองแดง';
                default: return '';
            }
        }

        // Main render function
        function renderAll() {
            // Filter data
            const filteredData = medalData.filter(item => {
                const searchLower = searchTerm.trim();
                const matchSearch = item.sport.toLowerCase().includes(searchLower) || 
                                    item.event.toLowerCase().includes(searchLower) || 
                                    item.athletes.some(a => a.toLowerCase().includes(searchLower));
                const matchSport = selectedSport === 'All' || item.sport === selectedSport;
                return matchSearch && matchSport;
            });

            // Update stats
            const counts = { Gold: 0, Silver: 0, Bronze: 0 };
            filteredData.forEach(item => {
                if (counts[item.type] !== undefined) {
                    counts[item.type]++;
                }
            });
            
            statGold.textContent = counts.Gold;
            statSilver.textContent = counts.Silver;
            statBronze.textContent = counts.Bronze;
            statTotal.textContent = filteredData.length;

            // Render Views
            renderMobileView(filteredData);
            renderDesktopView(filteredData);

            // Re-initialize Lucide Icons for newly injected HTML
            lucide.createIcons();
        }

        function renderMobileView(data) {
            if (data.length === 0) {
                mobileView.innerHTML = `
                    <div class="bg-white p-10 rounded-2xl text-center text-slate-400 border border-slate-100">
                        <i data-lucide="search" class="w-10 h-10 mb-3 mx-auto opacity-20"></i>
                        <p class="text-sm">ไม่พบข้อมูลที่ตรงกับการค้นหา</p>
                    </div>
                `;
                return;
            }

            mobileView.innerHTML = data.map((item, index) => {
                const athletesHtml = item.athletes.map(athlete => `
                    <div class="bg-slate-50 border border-slate-100 px-2.5 py-1 rounded-lg text-xs text-slate-700 flex items-center gap-1">
                        <i data-lucide="users" class="w-3 h-3 text-emerald-500"></i>
                        ${athlete}
                    </div>
                `).join('');

                return `
                    <div class="bg-white p-4 rounded-2xl shadow-sm border border-slate-100 relative">
                        <div class="flex justify-between items-start mb-2">
                            <div class="flex items-center gap-1.5 px-2.5 py-1 rounded-full border text-[10px] md:text-xs font-bold ${getMedalColorClass(item.type)}">
                                <i data-lucide="medal" class="w-3.5 h-3.5"></i>
                                ${getMedalText(item.type)}
                            </div>
                            <span class="text-slate-400 text-[10px] font-medium bg-slate-50 px-2 py-0.5 rounded-md border border-slate-100">
                                ลำดับ ${index + 1}
                            </span>
                        </div>
                        <h3 class="font-bold text-slate-800 text-base mb-1">${item.sport}</h3>
                        <div class="flex items-start gap-1.5 text-slate-600 text-xs mb-3">
                            <i data-lucide="info" class="w-3.5 h-3.5 mt-0.5 shrink-0 text-slate-400"></i>
                            <span class="leading-relaxed">${item.event}</span>
                        </div>
                        <div class="pt-3 border-t border-slate-50 flex flex-wrap gap-1.5">
                            ${athletesHtml}
                        </div>
                    </div>
                `;
            }).join('');
        }

        function renderDesktopView(data) {
            if (data.length === 0) {
                desktopTbody.innerHTML = `
                    <tr>
                        <td colSpan="5" class="p-20 text-center text-slate-400">
                            <div class="flex flex-col items-center">
                                <i data-lucide="search" class="w-12 h-12 mb-3 opacity-20"></i>
                                <p>ไม่พบข้อมูลที่ตรงกับการค้นหา</p>
                            </div>
                        </td>
                    </tr>
                `;
                return;
            }

            desktopTbody.innerHTML = data.map((item, index) => {
                const athletesHtml = item.athletes.map(athlete => `
                    <div class="bg-white border border-slate-200 px-3 py-1 rounded-lg text-sm text-slate-700 flex items-center gap-1.5 shadow-sm">

                    </div>
                `).join('');

                return `
                    <tr class="hover:bg-slate-50/50 transition-colors group">
                        <td class="p-5 text-slate-400 font-medium text-center">${index + 1}</td>
                        <td class="p-5">
                            <div class="flex items-center gap-2 px-3 py-1.5 rounded-full border text-xs font-bold w-fit ${getMedalColorClass(item.type)}">
                                <i data-lucide="medal" class="w-4 h-4"></i>
                                ${getMedalText(item.type)}
                            </div>
                        </td>
                        <td class="p-5">
                            <span class="font-semibold text-slate-700">${item.sport}</span>
                        </td>
                        <td class="p-5 text-slate-600">
                            <div class="flex items-start gap-1.5">
                                <i data-lucide="info" class="w-4 h-4 mt-0.5 text-slate-300"></i>
                                <span>${item.event}</span>
                            </div>
                        </td>
                        <td class="p-5">
                            <div class="flex flex-wrap gap-1.5">
                                ${athletesHtml}
                            </div>
                        </td>
                    </tr>
                `;
            }).join('');
        }

        // Run application
        document.addEventListener('DOMContentLoaded', init);
    </script>
